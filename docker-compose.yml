services:

  mlflow:
    build: .
    container_name: property-mlflow
    command: >
      mlflow server
        --host 0.0.0.0
        --port 5002
        --backend-store-uri sqlite:///mlflow.db
        --default-artifact-root file:///app/mlartifacts
    ports:
      - "5002:5002"
    volumes:
      - ./mlflow.db:/app/mlflow.db
      - ./mlartifacts:/app/mlartifacts
    environment:
      - MLFLOW_SERVER_ALLOWED_HOSTS=*

  app:
    build: .
    container_name: property-app
    command: streamlit run app/streamlit_app.py --server.port 8501 --server.headless true
    ports:
      - "8501:8501"
    env_file: .env
    environment:
      - MLFLOW_TRACKING_URI=http://mlflow:5002
    volumes:
      - ./mlartifacts:/app/mlartifacts
    depends_on:
      - mlflow
